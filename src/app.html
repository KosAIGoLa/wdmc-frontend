<!doctype html>
<html lang="zh-TW">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			/* Prevent light/dark flash before app hydrates */
			(function () {
				try {
					var k = 'wdmc-theme';
					var t = localStorage.getItem(k);
					if (t !== 'light' && t !== 'dark') {
						t = window.matchMedia('(prefers-color-scheme: dark)').matches
							? 'dark'
							: 'light';
					}
					document.documentElement.classList.toggle('dark', t === 'dark');
					document.documentElement.dataset.theme = t;
					document.documentElement.style.colorScheme = t;
				} catch (e) {}
			})();
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/earlyaccess/notosanstc.css"
			rel="stylesheet"
		/>
		%sveltekit.head%
		<style>
			html,
			body {
				margin: 0;
				min-height: 100%;
				background: #ffffff;
			}
			html.dark,
			html.dark body {
				background: #12100f;
			}
			/* Pre-hydration wait — stays until Svelte BootSplash mounts */
			#boot-pre {
				position: fixed;
				inset: 0;
				z-index: 10000;
				display: grid;
				place-items: center;
				background: #ffffff;
				transition: opacity 0.28s ease;
			}
			html.dark #boot-pre {
				background: #12100f;
			}
			#boot-pre .boot-pre-mark {
				position: relative;
				width: 48px;
				height: 48px;
			}
			#boot-pre .boot-pre-ring {
				position: absolute;
				inset: 0;
				border-radius: 50%;
				border: 2.5px solid rgba(229, 85, 74, 0.14);
				border-top-color: #e5554a;
				animation: boot-pre-spin 0.8s linear infinite;
			}
			#boot-pre .boot-pre-core {
				position: absolute;
				left: 50%;
				top: 50%;
				width: 10px;
				height: 10px;
				margin: -5px 0 0 -5px;
				border-radius: 50%;
				background: #e5554a;
				animation: boot-pre-pulse 1.1s ease-in-out infinite;
			}
			@keyframes boot-pre-spin {
				to {
					transform: rotate(360deg);
				}
			}
			@keyframes boot-pre-pulse {
				0%,
				100% {
					transform: scale(1);
					opacity: 0.85;
				}
				50% {
					transform: scale(1.25);
					opacity: 1;
				}
			}
			@media (prefers-reduced-motion: reduce) {
				#boot-pre .boot-pre-ring,
				#boot-pre .boot-pre-core {
					animation: none;
				}
			}
		</style>
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="boot-pre" aria-busy="true" aria-live="polite">
			<div class="boot-pre-mark" aria-hidden="true">
				<span class="boot-pre-ring"></span>
				<span class="boot-pre-core"></span>
			</div>
		</div>
		<script>
			window.__wdmcBootHide = function () {
				var pre = document.getElementById('boot-pre');
				if (!pre) return;
				pre.style.opacity = '0';
				setTimeout(function () {
					if (pre && pre.parentNode) pre.parentNode.removeChild(pre);
				}, 300);
			};
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
